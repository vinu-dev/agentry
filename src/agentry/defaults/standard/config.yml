# Agentry — bundled standard 6-role default configuration
# =============================================================================
#
# This is the config Agentry uses when a target repo doesn't provide its own
# .agentry/config.yml. It's also what `agentry init` copies into a target.
#
# Each role has a minimal prompt that mentions the parallel-pipeline context
# and points the agent at its rule file in docs/ai/roles/<role>.md. If you
# delete the `prompt:` line, the framework falls back to a longer generic
# template (see src/agentry/prompt.py) that explains the same pattern in
# more detail.

target_repo: <owner>/<repo>           # operator overrides in their target repo

agents:

  researcher:
    cli: claude
    args: ["-p", "--dangerously-skip-permissions"]
    interval_min: 60
    total_min: 30
    stall_min: 5
    prompt: |
      You are the Researcher in a parallel multi-agent pipeline. Other roles
      (architect, implementer, tester, reviewer, release) run concurrently
      with you. Read docs/ai/roles/researcher.md and follow it. If that file
      doesn't exist, exit with error.

  architect:
    cli: claude
    args: ["-p", "--dangerously-skip-permissions"]
    interval_min: 5
    total_min: 30
    stall_min: 5
    prompt: |
      You are the Architect in a parallel multi-agent pipeline. Other roles
      (researcher, implementer, tester, reviewer, release) run concurrently
      with you. Read docs/ai/roles/architect.md and follow it. If that file
      doesn't exist, exit with error.

  implementer:
    cli: codex                        # or claude — operator's choice
    args: ["--auto-approve"]
    interval_min: 5
    total_min: 60
    stall_min: 10
    prompt: |
      You are the Implementer in a parallel multi-agent pipeline. Other roles
      (researcher, architect, tester, reviewer, release) run concurrently with
      you. Read docs/ai/roles/implementer.md and follow it. If that file
      doesn't exist, exit with error.

  tester:
    cli: claude
    args: ["-p", "--dangerously-skip-permissions"]
    interval_min: 5
    total_min: 30                     # raise to 60+ if rule file includes hardware steps
    stall_min: 10
    prompt: |
      You are the Tester in a parallel multi-agent pipeline. Other roles
      (researcher, architect, implementer, reviewer, release) run concurrently
      with you. Read docs/ai/roles/tester.md and follow it. If that file
      doesn't exist, exit with error.

  reviewer:
    cli: claude
    args: ["-p", "--dangerously-skip-permissions"]
    interval_min: 5
    total_min: 20
    stall_min: 5
    prompt: |
      You are the Reviewer in a parallel multi-agent pipeline. Other roles
      (researcher, architect, implementer, tester, release) run concurrently
      with you. Read docs/ai/roles/reviewer.md and follow it. If that file
      doesn't exist, exit with error.

  release:
    cli: claude
    args: ["-p", "--dangerously-skip-permissions"]
    interval_min: 1440                # daily
    total_min: 60
    stall_min: 15
    prompt: |
      You are the Release Engineer in a parallel multi-agent pipeline. Other
      roles (researcher, architect, implementer, tester, reviewer) run
      concurrently with you. Read docs/ai/roles/release.md and follow it. If
      that file doesn't exist, exit with error.

# Paths the Reviewer's rule file should treat as block-worthy.
sensitive_paths:
  - "**/auth/**"
  - "**/secrets/**"
  - "**/.github/workflows/**"
