# Agentry — per-host configuration
# =============================================================================
#
# Copy this file to ~/.agentry/pipeline.local.toml (Linux)
# or %USERPROFILE%\.agentry\pipeline.local.toml (Windows).
# The local copy is gitignored and machine-specific.
#
# Per-target settings (which agents, which models, what timeouts) live in the
# target repo's .agentry/config.yml — NOT here.

[host]
# Where the orchestrator keeps logs and runtime state.
state_dir = "~/.agentry/state"

# Path to the secrets file. Loaded once at startup.
env_file = "~/.agentry/.env"

[github]
# Env-var name (in env_file) holding the GitHub PAT.
# A fine-grained PAT is required because the orchestrator runs as a service
# and cannot use the interactive `gh auth` keyring.
token_env = "GITHUB_TOKEN"

[notification]
# Env-var name (in env_file) holding the Discord webhook URL.
discord_webhook_env = "DISCORD_WEBHOOK_URL"

[orchestrator]
# Discord posts are accumulated and flushed every N seconds to avoid
# hitting the per-webhook rate limit (30/min).
batch_notify_seconds = 60
